version: "3.9"

services:
  app:
    build: .
    container_name: JobDozo-app
    environment:
      - PORT=8123
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      # Optional: point the data layer at MongoDB instead of the embedded store
      - MONGODB_URI=mongodb://mongo:27017/JobDozo
    volumes:
      - JobDozo-data:/app/server/data
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: JobDozo-mongo
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: JobDozo-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  JobDozo-data:
  mongo-data:
