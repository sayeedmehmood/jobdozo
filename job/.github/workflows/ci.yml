name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Syntax check
        run: npm run check

      - name: Smoke test API
        run: |
          node server/index.js &
          sleep 3
          curl -fsS http://localhost:8123/api/health
          curl -fsS http://localhost:8123/api/jobs | head -c 300

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t JobDozo:ci .
